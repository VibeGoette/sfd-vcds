<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {"@type":"Question","name":"Brauche ich pro Fahrzeug einen separaten Service?","acceptedAnswer":{"@type":"Answer","text":"Nein. Der SFD-Service ist an das Konto und das Interface gebunden, nicht an ein Fahrzeug. Innerhalb der Laufzeit können beliebig viele Fahrzeuge entsperrt werden."}},
    {"@type":"Question","name":"Funktioniert der Service offline?","acceptedAnswer":{"@type":"Answer","text":"Nein. Für den Sitzungsstart wird eine aktive Internetverbindung benötigt. Sobald die Sitzung steht, kann das Interface auch in Bereichen ohne Empfang weiter mit dem Fahrzeug arbeiten – aber jede neue Sitzung erfordert Online-Zugang."}},
    {"@type":"Question","name":"Geht das auch bei Porsche oder Lamborghini?","acceptedAnswer":{"@type":"Answer","text":"Aktuell nicht. Der Online-SFD-Service deckt VW, Audi, Škoda, SEAT, CUPRA, Bentley und MAN ab. Porsche, Lamborghini, Bugatti und Ducati nutzen andere Diagnose-Architekturen und sind nicht im SFD-Scope."}},
    {"@type":"Question","name":"Welche Fahrzeuge sind betroffen?","acceptedAnswer":{"@type":"Answer","text":"Alle VW-Konzernmarken Audi, Bentley, CUPRA, MAN, SEAT, Škoda und VW ab Modelljahr 2020/2021 — konkret die ab diesem Zeitpunkt neu eingeführten Modelle. Welche einzelnen Steuergeräte SFD-geschützt sind, zeigt der Auto-Scan im Fahrzeug."}},
    {"@type":"Question","name":"Kann SFD dauerhaft deaktiviert werden?","acceptedAnswer":{"@type":"Answer","text":"Nein. Weder VCDS noch ODIS können SFD permanent deaktivieren. Die Freischaltung läuft nach 90 Minuten automatisch ab — danach ist eine neue SFD-Sitzung erforderlich."}},
    {"@type":"Question","name":"Warum muss ich einen Ausweis hochladen?","acceptedAnswer":{"@type":"Answer","text":"VW verlangt 100% Rückverfolgbarkeit aller SFD-Tokens. Ross-Tech ist vertraglich zur Identitätsprüfung verpflichtet. Ohne verifizierte Identität keine SFD-Sitzung."}},
    {"@type":"Question","name":"Wie lange dauert die Bearbeitung?","acceptedAnswer":{"@type":"Answer","text":"1–3 Werktage. Die Identitätsprüfung wird manuell durchgeführt, sobald die Unterlagen vollständig vorliegen. Sobald freigeschaltet, ist das Konto sofort einsatzbereit."}},
    {"@type":"Question","name":"Was ist der Diagnosefilter?","acceptedAnswer":{"@type":"Answer","text":"Ein zusätzlicher Schutzmechanismus, der bei neueren Modellen ab MJ 2024 den Zugriff auf Steuergeräte komplett blockiert (in VCDS sichtbar als -R am VCID). Erst nach Gateway-Unlock und Filter-Deaktivierung sind die Module im Standard-Modus erreichbar."}},
    {"@type":"Question","name":"Gibt es Nutzungslimits?","acceptedAnswer":{"@type":"Answer","text":"Ja: maximal 50 Anfragen pro Stunde, 250 pro Tag und 20 verschiedene VINs pro Tag."}},
    {"@type":"Question","name":"Werden meine Aktivitäten protokolliert?","acceptedAnswer":{"@type":"Answer","text":"Ja. Jede SFD-Sitzung wird auf den Servern dokumentiert (Zeitstempel, VIN, Steuergerät). Das ist Teil der Architektur und nicht abstellbar."}}
  ]
}
